<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CEditor - Asset Editor</title>
    <link rel="icon" href="/favicon.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
        margin: 0px 12px;
      }

      .container {
        max-width: 1600px;
        margin: 0 auto;
      }

      h1 {
        color: #4ec9b0;
        font-size: 20px;
      }

      .asset-types {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }

      .asset-card {
        background: #252526;
        border: 1px solid #3e3e42;
        border-radius: 8px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .asset-card:hover {
        border-color: #4ec9b0;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(78, 201, 176, 0.2);
      }

      .asset-card h2 {
        color: #4ec9b0;
        margin-bottom: 10px;
      }

      .asset-card p {
        color: #858585;
        font-size: 14px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #858585;
      }

      .error {
        background: #5a1d1d;
        border: 1px solid #a1260d;
        color: #f48771;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 20px;
      }

      /* Pixel-art sprites in forms and lists (nearest-neighbor when scaled) */
      canvas.sprite-render,
      .sprite-picker canvas.sprite-render,
      .generic-modal canvas.sprite-render,
      .item-template-form canvas.sprite-render,
      .character-template-form canvas.sprite-render {
        image-rendering: -moz-crisp-edges;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* Editor layout */
      .editor-page {
        display: flex;
        flex-direction: column;
        height: 100vh;
        min-height: 0;
        overflow: hidden;
      }

      .editor-page-body {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .editor-header {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
        padding: 14px 4px 14px 0;
        border-bottom: 1px solid #3e3e42;
      }

      .editor-header-start {
        flex-shrink: 0;
      }

      .editor-header-title {
        flex: 1;
        margin: 0;
        min-width: 0;
        font-size: 22px;
        line-height: 1.25;
      }

      .editor-header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .editor-header .editor-header-control.form-group {
        margin-bottom: 0;
      }

      .editor-header .editor-header-control select {
        min-width: 200px;
        padding: 8px 10px;
        font-size: 14px;
      }

      .editor-tab-bar {
        display: flex;
        flex-shrink: 0;
        border-bottom: 1px solid #3e3e42;
        background-color: #1e1e1e;
        overflow-x: auto;
      }

      .editor-main {
        flex: 1;
        min-height: 0;
        overflow: auto;
        display: flex;
        flex-direction: column;
      }

      .editor-main > *:not(.special-events-subheader) {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: auto;
      }

      .special-events-editor-main {
        overflow: hidden;
      }

      .special-events-subheader {
        flex: 0 0 auto;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-bottom: 1px solid #3e3e42;
        background-color: #252526;
        z-index: 10;
      }

      .special-events-editor-content {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      /* Map editor left sidebar — aligned scroll areas */
      .tile-editor-sidebar {
        width: calc(250px - 8px);
        border-right: 1px solid #3e3e42;
        background-color: #1e1e1e;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 4px;
        min-height: 0;
        box-sizing: border-box;
      }

      .tile-editor-sidebar-section {
        flex-shrink: 0;
        padding: 8px 6px;
        box-sizing: border-box;
      }

      .tile-editor-map-search {
        margin-bottom: 4px;
      }

      .tile-editor-map-search-label {
        color: #858585;
        font-size: 11px;
        text-transform: uppercase;
        font-weight: bold;
        margin-bottom: 6px;
      }

      .tile-editor-search-section {
        border: 1px solid #3e3e42;
        border-radius: 4px;
        margin-bottom: 4px;
        overflow: visible;
      }

      .tile-editor-search-section:last-child {
        margin-bottom: 0;
      }

      .tile-editor-search-section-header {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 8px;
        border: none;
        background: #2d2d30;
        color: #cccccc;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
      }

      .tile-editor-search-section-header:hover {
        background: #3e3e42;
      }

      .tile-editor-search-section-chevron {
        color: #858585;
        font-size: 10px;
        flex-shrink: 0;
      }

      .tile-editor-search-section-body {
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        border-top: 1px solid #3e3e42;
        background: #1e1e1e;
      }

      .tile-editor-search-message {
        color: #f48771;
        font-size: 11px;
        line-height: 1.3;
      }

      .tile-editor-marker-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .tile-editor-marker-accordion-header {
        display: flex;
        align-items: stretch;
        gap: 0;
      }

      .tile-editor-marker-accordion-toggle {
        flex: 1;
        min-width: 0;
        border-radius: 0;
      }

      .tile-editor-marker-accordion-name {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: monospace;
        font-size: 12px;
        text-align: left;
      }

      .tile-editor-marker-accordion-meta {
        flex-shrink: 0;
        color: #858585;
        font-size: 10px;
        font-weight: 400;
        margin-right: 4px;
      }

      .tile-editor-marker-remove {
        flex-shrink: 0;
        padding: 0 8px;
        border: none;
        border-left: 1px solid #3e3e42;
        background: #5a2a2a;
        color: #ffffff;
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tile-editor-marker-remove:hover {
        background: #6a3a3a;
      }

      .tile-editor-marker-refs {
        gap: 4px;
      }

      .tile-editor-marker-refs-empty {
        color: #858585;
        font-size: 11px;
        font-style: italic;
      }

      .tile-editor-marker-ref-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        padding: 4px 0;
      }

      .tile-editor-marker-ref-row:not(:last-child) {
        border-bottom: 1px solid #2d2d30;
      }

      .tile-editor-marker-ref-label {
        color: #cccccc;
        font-size: 11px;
        font-family: monospace;
        min-width: 0;
      }

      .tile-editor-sidebar-selected-tile {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding-top: 0;
      }

      .tile-editor-map-tools-overlay {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 10;
        padding: 8px;
        background: rgba(30, 30, 30, 0.92);
        border: 1px solid #3e3e42;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        pointer-events: auto;
      }

      .tile-editor-map-tools-overlay .tile-editor-tool-grid {
        width: 250px;
      }

      /* Scroll track only — border lives on inner panel so both gutters line up */
      .tile-editor-sidebar-scroll {
        width: 100%;
        box-sizing: border-box;
        overflow-y: scroll;
        overflow-x: hidden;
        scrollbar-gutter: stable;
      }

      .tile-editor-sidebar-scroll::-webkit-scrollbar {
        width: 14px;
      }

      .tile-editor-sidebar-scroll::-webkit-scrollbar-track {
        background: #1e1e1e;
      }

      .tile-editor-sidebar-scroll::-webkit-scrollbar-thumb {
        background: #3e3e42;
        border-radius: 4px;
        border: 3px solid #1e1e1e;
      }

      .tile-editor-sidebar-panel {
        border: 1px solid #3e3e42;
        border-radius: 4px;
        background: #1e1e1e;
        box-sizing: border-box;
      }

      .tile-editor-layer-list {
        display: flex;
        flex-direction: column;
      }

      .tile-editor-layer-row {
        display: block;
        width: 100%;
        padding: 6px 10px;
        border: none;
        border-bottom: 1px solid #3e3e42;
        background: transparent;
        color: #d4d4d4;
        font-size: 14px;
        font-family: inherit;
        text-align: left;
        cursor: pointer;
        box-sizing: border-box;
      }

      .tile-editor-layer-row:last-child {
        border-bottom: none;
      }

      .tile-editor-layer-row:hover {
        background: #2d2d30;
      }

      .tile-editor-layer-row.selected {
        background: #094771;
        color: #ffffff;
      }

      .tile-editor-sidebar-tile-info {
        flex: 1;
        min-height: 0;
      }

      .tile-editor-tool-grid {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 100%;
      }

      .tile-editor-tool-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 4px;
        width: 100%;
      }

      .tile-editor-tool-button {
        width: 100%;
        aspect-ratio: 1;
        min-width: 0;
        padding: 4px;
        box-sizing: border-box;
        border: none;
        border-radius: 4px;
        color: #ffffff;
        font-size: 16px;
        font-weight: bold;
        line-height: 1;
        cursor: pointer;
        background: #3e3e42;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tile-editor-tool-button:hover {
        background: #4a4a4a;
      }

      .tile-editor-tool-button.active {
        background: #4ec9b0;
      }

      .tile-editor-tool-button.active:hover {
        background: #4ec9b0;
      }

      .tile-editor-tool-icon-bucket-delete {
        display: inline-block;
        filter: sepia(100%) saturate(800%) hue-rotate(320deg) brightness(0.9);
      }

      .editor-empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        min-height: 0;
      }

      .editor-empty-state p {
        margin: 0;
        color: #858585;
        font-size: 14px;
        text-align: center;
        max-width: 360px;
        line-height: 1.45;
      }

      .editor-page .editor-content {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 6px;
        flex: 1;
        min-height: 0;
        height: 100%;
        padding-top: 12px;
        box-sizing: border-box;
      }

      .editor-sidebar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow: hidden;
        min-height: 0;
        height: 100%;
      }

      .search-box input {
        width: 100%;
        padding: 10px;
        background: #252526;
        border: 1px solid #3e3e42;
        border-radius: 4px;
        color: #d4d4d4;
        font-size: 14px;
      }

      .search-box input:focus {
        outline: none;
        border-color: #4ec9b0;
      }

      .event-type-filter-label {
        margin: 0px 4px;
        user-select: none;
      }

      .item-list {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 5px;
        scrollbar-width: thin; /* Firefox */
        scrollbar-color: #3e3e42 #1e1e1e; /* Firefox: thumb and track */
      }

      /* Webkit browsers (Chrome, Safari, Edge) */
      .item-list::-webkit-scrollbar {
        width: 8px;
      }

      .item-list::-webkit-scrollbar-track {
        background: #1e1e1e;
      }

      .item-list::-webkit-scrollbar-thumb {
        background: #3e3e42;
        border-radius: 4px;
      }

      .item-list::-webkit-scrollbar-thumb:hover {
        background: #4e4e52;
      }

      .item-card {
        background: #252526;
        border: 1px solid #3e3e42;
        border-radius: 8px;
        padding: 5px;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
        margin: 0px 3px;
      }

      .item-card.editing {
        border-color: #4ec9b0;
        background: #2d2d30;
        box-shadow: 0 0 0 2px rgba(78, 201, 176, 0.3);
      }

      .item-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2px;
      }

      .item-card-header h3 {
        color: #4ec9b0;
        font-size: 16px;
        margin: 0;
      }

      .item-card-actions {
        display: flex;
        gap: 4px;
      }

      .item-card-actions .btn-card-action {
        padding: 2px 6px;
        min-width: 22px;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.2;
      }

      .item-card-body {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .item-info {
        display: flex;
        gap: 10px;
        font-size: 12px;
      }

      .item-id {
        width: 190px;
        overflow: hidden;
        white-space: pre;
        text-overflow: ellipsis;
        height: 21px;
      }

      .item-type {
        background: #4a7c59;
        padding: 2px 2px;
        border-radius: 4px;
        color: white;
        font-size: 10px;
        display: inline-block;
        text-align: center;
      }

      /* Special Events sidebar: fixed type column + actions pinned right */
      .special-event-list-card {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        min-width: 0;
      }

      .special-event-list-card-main {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .special-event-type-badge {
        flex: 0 0 52px;
        width: 52px;
        box-sizing: border-box;
      }

      .special-event-list-card .item-id {
        flex: 1;
        min-width: 0;
        width: auto;
      }

      .special-event-list-card .item-card-actions {
        flex: 0 0 auto;
        margin-left: auto;
      }

      .item-name {
        color: #858585;
      }

      .item-description {
        color: #858585;
        font-size: 14px;
        margin: 0;
      }

      .item-stats {
        display: flex;
        gap: 15px;
        font-size: 12px;
        color: #858585;
      }

      .item-form {
        background: #252526;
        border: 1px solid #3e3e42;
        border-radius: 8px;
        padding: 30px;
        /* transition: all 0.2s; */
      }

      .item-form.new {
        border-color: #4ec9b0;
        box-shadow: 0 0 0 3px rgba(78, 201, 176, 0.4);
      }

      .item-form h2 {
        color: #4ec9b0;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #d4d4d4;
        font-size: 14px;
        font-weight: 500;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 10px;
        background: #1e1e1e;
        border: 1px solid #3e3e42;
        border-radius: 4px;
        color: #d4d4d4;
        font-size: 17px;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #4ec9b0;
      }

      .form-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 30px;
      }

      .btn-back,
      .btn-primary,
      .btn-secondary,
      .btn-small,
      .btn-danger {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s;
      }

      .btn-back {
        background: transparent;
        color: #d4d4d4;
      }

      .btn-back:hover {
        background: #4e4e52;
      }

      .btn-back:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
      }

      .btn-primary {
        background: #007acc;
        color: white;
      }

      .btn-primary:hover {
        background: #0098ff;
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
      }

      .btn-secondary {
        background: #3e3e42;
        color: #d4d4d4;
      }

      .btn-secondary:hover {
        background: #4e4e52;
      }

      .btn-secondary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
      }

      .btn-small {
        padding: 6px 12px;
        font-size: 12px;
        background: #656570;
        color: #fff;
      }

      .btn-small:hover {
        background: #4e4e52;
      }

      .btn-small:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
      }

      .btn-icon {
        padding: 2px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.2s;
        background: #4e4e52;
        /* background: transparent; */
        color: #d4d4d4;
      }

      .btn-danger {
        background: #a1260d;
        color: white;
      }

      .btn-danger:hover {
        background: #c53030;
      }

      .btn-danger:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #858585;
      }

      .item-actions {
        margin-bottom: 0px;
      }

      .notification {
        position: fixed;
        top: 2px;
        left: calc(50% - 150px);
        padding: 10px;
        border-radius: 4px;
        color: white;
        font-size: 14px;
        z-index: 1000;
        opacity: 0;
        transform: translateY(-100%);
        transition: all 0.3s;
        width: 300px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .notification.show {
        opacity: 1;
        transform: translateY(0);
      }

      .notification.success {
        background: #2d5016;
        border: 1px solid #4ec9b0;
      }

      .notification.error {
        background: #5a1d1d;
        border: 1px solid #a1260d;
      }

      .form-section {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid #3e3e42;
      }

      .form-section h3 {
        color: #4ec9b0;
        margin-bottom: 20px;
        font-size: 18px;
      }

      .status-effect-item {
        background: #1e1e1e;
        border: 1px solid #3e3e42;
        border-radius: 4px;
        padding: 15px;
        margin-bottom: 15px;
      }

      .status-effect-header {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 15px;
      }

      .status-effect-header select {
        flex: 1;
      }

      .form-subsection {
        margin-bottom: 25px;
        padding-bottom: 20px;
        border-bottom: 1px solid #2d2d30;
      }

      .form-subsection:last-child {
        border-bottom: none;
      }

      .form-subsection h4 {
        color: #858585;
        margin-bottom: 15px;
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .form-subsection label {
        max-width: 300px;
      }

      .status-item {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        align-items: center;
      }

      .status-item .status-input {
        flex: 1;
      }

      .character-template-form,
      .item-template-form,
      .ability-template-form,
      .status-effect-template-form {
        padding: 16px 20px;
      }

      .character-template-form h2,
      .item-template-form h2,
      .ability-template-form h2,
      .status-effect-template-form h2 {
        margin-bottom: 12px;
      }

      .character-template-form .form-fields-inline,
      .item-template-form .form-fields-inline,
      .ability-template-form .form-fields-inline,
      .status-effect-template-form .form-fields-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        align-items: flex-end;
      }

      .character-template-form .form-fields-inline > .form-group,
      .item-template-form .form-fields-inline > .form-group,
      .ability-template-form .form-fields-inline > .form-group,
      .status-effect-template-form .form-fields-inline > .form-group {
        margin-bottom: 0;
        flex: 0 1 auto;
      }

      .character-template-form .form-fields-inline .form-group label,
      .item-template-form .form-fields-inline .form-group label,
      .ability-template-form .form-fields-inline .form-group label,
